<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SolFoundry — AI Software Factory on Solana</title>
    <meta name="description" content="Autonomous AI Software Factory on Solana. Post bounties, earn $FNDRY, build with AI agents." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Updated synchronously below to match resolved light/dark (system = prefers-color-scheme when no saved choice). -->
    <meta name="theme-color" content="#ffffff" />
    <script>
      (function() {
        try {
          var key = 'solfoundry-theme';
          var stored = localStorage.getItem(key);
          var theme = (stored === 'light' || stored === 'dark' || stored === 'system') ? stored : 'system';
          var isDark = theme === 'dark' ||
            (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          var root = document.documentElement;
          if (isDark) {
            root.classList.add('dark');
          } else {
            root.classList.remove('dark');
          }
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) {
            meta.setAttribute('content', isDark ? '#0a0a0a' : '#ffffff');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-surface-light dark:bg-surface text-gray-900 dark:text-white antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
