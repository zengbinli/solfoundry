name: Claim Guard

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  claim-guard:
    runs-on: ubuntu-latest
    concurrency:
      group: claim-guard-${{ github.event.issue.number }}-${{ github.event.comment.user.login }}
    steps:
      - name: Guard claims and clean spam
        env:
          GH_TOKEN: ${{ secrets.SOLFOUNDRY_GITHUB_PAT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.SOLFOUNDRY_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.SOLFOUNDRY_TELEGRAM_CHAT_ID }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          COMMENT_ID: ${{ github.event.comment.id }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python3 << 'PYEOF'
          import os, re, json, urllib.request

          labels = os.environ.get("ISSUE_LABELS", "")
          issue_title = os.environ.get("ISSUE_TITLE", "").lower()
          comment = os.environ.get("COMMENT_BODY", "")
          user = os.environ.get("COMMENT_USER", "")
          comment_id = os.environ.get("COMMENT_ID", "")
          issue = os.environ.get("ISSUE_NUMBER", "")

          # Skip content/social bounties — these expect non-code submissions
          content_keywords = ["x/twitter", "x post", "content", "tweet", "social media", "video", "article", "blog"]
          if any(kw in issue_title for kw in content_keywords):
              print(f"Content bounty #{issue} — skipping claim guard")
              exit(0)

          # Skip star reward issue
          if issue == "48":
              print("Star reward issue — skipping")
              exit(0)
          repo = os.environ.get("GITHUB_REPOSITORY", "SolFoundry/solfoundry")
          token = os.environ.get("GH_TOKEN", "")

          # Skip bot and org owner comments
          if user in ["github-actions[bot]", "chronoeth-creator"]:
              exit(0)

          # Only act on bounty issues
          if "bounty" not in labels:
              print("Not a bounty issue - skipping")
              exit(0)

          def gh_post(path, data):
              url = f"https://api.github.com/{path}"
              req = urllib.request.Request(url, json.dumps(data).encode(), method="POST")
              req.add_header("Authorization", f"token {token}")
              req.add_header("Accept", "application/vnd.github.v3+json")
              req.add_header("Content-Type", "application/json")
              try:
                  return urllib.request.urlopen(req)
              except Exception as e:
                  print(f"POST failed: {e}")
                  return None

          def gh_delete(path):
              url = f"https://api.github.com/{path}"
              req = urllib.request.Request(url, method="DELETE")
              req.add_header("Authorization", f"token {token}")
              req.add_header("Accept", "application/vnd.github.v3+json")
              try:
                  return urllib.request.urlopen(req)
              except Exception as e:
                  print(f"DELETE failed: {e}")
                  return None

          def gh_get(path):
              url = f"https://api.github.com/{path}"
              req = urllib.request.Request(url)
              req.add_header("Authorization", f"token {token}")
              req.add_header("Accept", "application/vnd.github.v3+json")
              try:
                  resp = urllib.request.urlopen(req)
                  return json.loads(resp.read().decode()), resp.status
              except urllib.error.HTTPError as e:
                  return None, e.code

          lower = comment.lower()

          # --- REPEAT OFFENDER CHECK (all tiers) ---
          # If the bot already warned this user on this issue, auto-delete further claim attempts
          comments_data, _ = gh_get(f"repos/{repo}/issues/{issue}/comments?per_page=100")
          if comments_data:
              already_warned = False
              for c in comments_data:
                  body_c = c.get("body", "")
                  author = c["user"]["login"]
                  # Check if bot/owner already posted a warning/rules message for this user
                  if author in ["chronoeth-creator", "github-actions[bot]"] and f"@{user}" in body_c:
                      if any(kw in body_c.lower() for kw in [
                          "require at least", "away from t2", "away from t3",
                          "open race", "fcfs", "no claiming needed",
                          "reputation-gated", "pending owner approval",
                          "posts have been removed", "auto-deleted"
                      ]):
                          already_warned = True
                          break

              if already_warned:
                  print(f"REPEAT OFFENDER: {user} already warned on #{issue} — auto-deleting comment {comment_id}")
                  gh_delete(f"repos/{repo}/issues/comments/{comment_id}")
                  exit(0)

          # --- SPAM DETECTION ---
          spam_patterns = [
              r"(i am a .* developer|hire me|my portfolio|check my profile)",
              r"(dm me|contact me at|whatsapp|telegram.*@)",
              r"(upvote|follow me|subscribe|check out my)",
              r"(great (project|repo|work).*star|nice repo.*followed)",
          ]
          is_spam = any(re.search(p, lower) for p in spam_patterns)

          if is_spam:
              print(f"SPAM detected from {user} on #{issue} — deleting")
              gh_delete(f"repos/{repo}/issues/comments/{comment_id}")
              exit(0)

          # --- CLAIM DETECTION ---
          claim_re = r"(/attempt|attempt|claim|dibs|i.?ll take|assigning myself|assign.*(me|this)|can i (take|work)|i want to (take|work)|want to work|working on this|taking this|claiming this|want to implement|i.?d like to (work|take|build|implement)|interested in this|please assign|let me work|i.?ll work on|i.?ll build|i.?ll implement)"
          is_claim = bool(re.search(claim_re, lower))

          if not is_claim:
              print("Not a claim attempt — ignoring")
              exit(0)

          # Determine tier
          is_t1 = "tier-1" in labels
          is_t2 = "tier-2" in labels
          is_t3 = "tier-3" in labels

          # ── Shared helper: fetch issue tier by issue number ──
          def get_issue_tier(issue_num):
              """Check if an issue is a real bounty and return its tier label."""
              try:
                  url_i = f"https://api.github.com/repos/{repo}/issues/{issue_num}"
                  req_i = urllib.request.Request(url_i)
                  req_i.add_header("Authorization", f"token {token}")
                  req_i.add_header("Accept", "application/vnd.github.v3+json")
                  resp_i = urllib.request.urlopen(req_i)
                  issue_data = json.loads(resp_i.read().decode())
                  title_lower = issue_data.get("title", "").lower()
                  ilabels = [l["name"] for l in issue_data.get("labels", [])]
                  if str(issue_num) == "48":
                      return None
                  content_kw = ["x/twitter", "x post", "content", "tweet", "social media", "video", "article", "blog"]
                  if any(kw in title_lower for kw in content_kw):
                      return None
                  if "bounty" not in ilabels:
                      return None
                  for t in ("tier-3", "tier-2", "tier-1"):
                      if t in ilabels:
                          return t
                  return "tier-1"
              except Exception:
                  return None

          # ── Shared helper: count user's merged bounty PRs by tier ──
          def count_user_bounty_prs(username):
              all_prs = []
              page = 1
              while True:
                  url = f"https://api.github.com/repos/{repo}/pulls?state=closed&per_page=100&page={page}"
                  req = urllib.request.Request(url)
                  req.add_header("Authorization", f"token {token}")
                  req.add_header("Accept", "application/vnd.github.v3+json")
                  resp = urllib.request.urlopen(req)
                  batch = json.loads(resp.read().decode())
                  if not batch:
                      break
                  all_prs.extend(batch)
                  if len(batch) < 100:
                      break
                  page += 1
                  if page > 10:  # Safety cap: 1000 PRs max
                      break
              t1_count = 0
              t2_count = 0
              t3_count = 0
              for pr in all_prs:
                  if pr["user"]["login"] != username or not pr.get("merged_at"):
                      continue
                  pr_body = pr.get("body", "") or ""
                  linked = re.findall(r"(?:closes|fixes|resolves)\s*#(\d+)", pr_body, re.IGNORECASE)
                  for linked_num in linked:
                      tier = get_issue_tier(linked_num)
                      if tier == "tier-1":
                          t1_count += 1
                      elif tier == "tier-2":
                          t2_count += 1
                      elif tier == "tier-3":
                          t3_count += 1
              return t1_count, t2_count, t3_count

          # ══════════════════════════════════════════════════════════════
          # TIER 1: Open Race / FCFS — no claiming, just submit a PR
          # ══════════════════════════════════════════════════════════════
          if is_t1:
              print(f"T1 claim attempt from {user} on #{issue} — deleting + posting FCFS rules")
              gh_delete(f"repos/{repo}/issues/comments/{comment_id}")

              body = (
                  f"👋 Hey @{user} — **Tier 1 bounties are open race (FCFS)**. "
                  f"No claiming needed!\n\n"
                  f"### How it works:\n"
                  f"1. Read the bounty spec in the issue description\n"
                  f"2. Build your solution and submit a PR linking this issue (`Closes #{issue}`)\n"
                  f"3. Include your **Solana wallet** in the PR body for payout\n"
                  f"4. Our multi-LLM review pipeline scores your submission\n"
                  f"5. **First PR to pass review wins** the bounty 🏆\n\n"
                  f"Just ship it — your code speaks for itself.\n\n"
                  f"*— SolFoundry Bot 🏭*"
              )
              gh_post(f"repos/{repo}/issues/{issue}/comments", {"body": body})

          # ══════════════════════════════════════════════════════════════
          # TIER 2: Reputation-Gated FCFS — need 4+ T1 completions, but
          # still FCFS (no claiming). First quality PR wins.
          # ══════════════════════════════════════════════════════════════
          elif is_t2:
              print(f"T2 claim attempt from {user} on #{issue} — deleting + checking reputation")
              gh_delete(f"repos/{repo}/issues/comments/{comment_id}")

              try:
                  t1_count, t2_count, t3_count = count_user_bounty_prs(user)
                  print(f"{user} bounty PRs: T1={t1_count}, T2={t2_count}, T3={t3_count}")

                  if t1_count < 4:
                      # Not enough reputation — post requirements
                      remaining = 4 - t1_count
                      print(f"Only {t1_count} T1 completions — {user} not eligible for T2")

                      body = (
                          f"⚠️ @{user} — **Tier 2 bounties are reputation-gated.** "
                          f"You need at least **4 completed Tier 1 bounties** to submit here.\n\n"
                          f"You have **{t1_count}** merged T1 bounty PR(s) — "
                          f"**{remaining} more** to unlock T2.\n\n"
                          f"### How to unlock Tier 2:\n"
                          f"1. Pick **Tier 1** bounties (open race, no claiming needed)\n"
                          f"2. Submit PRs that pass our AI review (≥6/10 score)\n"
                          f"3. Get 4 merged and you'll unlock Tier 2\n\n"
                          f"⚠️ Star rewards and content bounties don't count toward tier progression.\n\n"
                          f"Browse T1 bounties: [Filter by tier-1](https://github.com/{repo}/labels/tier-1)\n\n"
                          f"*— SolFoundry Bot 🏭*"
                      )
                      gh_post(f"repos/{repo}/issues/{issue}/comments", {"body": body})
                  else:
                      # Eligible — tell them it's FCFS, no claiming needed
                      print(f"{user} is eligible for T2 — posting FCFS rules")

                      body = (
                          f"👋 Hey @{user} — you're **eligible for Tier 2** (✅ {t1_count} T1 completions)!\n\n"
                          f"**Tier 2 is still FCFS** — no claiming needed. "
                          f"First quality PR to pass review wins.\n\n"
                          f"### How it works:\n"
                          f"1. Read the bounty spec in the issue description\n"
                          f"2. Build your solution and submit a PR (`Closes #{issue}`)\n"
                          f"3. Include your **Solana wallet** in the PR body\n"
                          f"4. Min AI review score: **7.0/10** (tests + docs required)\n"
                          f"5. **First PR to pass wins** 🏆\n\n"
                          f"Ship it!\n\n"
                          f"*— SolFoundry Bot 🏭*"
                      )
                      gh_post(f"repos/{repo}/issues/{issue}/comments", {"body": body})

              except Exception as e:
                  print(f"T2 reputation check failed: {e}")

          # ══════════════════════════════════════════════════════════════
          # TIER 3: Reputation + Approved Claim — need 3+ T2 completions
          # AND owner must approve the claim via Telegram.
          # This is the ONLY tier with a claim→approve/deny flow.
          # ══════════════════════════════════════════════════════════════
          elif is_t3:
              print(f"T3 claim attempt from {user} on #{issue} — checking reputation + routing to approval")

              try:
                  t1_count, t2_count, t3_count = count_user_bounty_prs(user)
                  print(f"{user} bounty PRs: T1={t1_count}, T2={t2_count}, T3={t3_count}")

                  # Gate: T3 requires 3+ T2 completions OR 5+ T1 and 1+ T2
                  t3_eligible = t2_count >= 3 or (t1_count >= 5 and t2_count >= 1)
                  if not t3_eligible:
                      print(f"Only T1={t1_count}, T2={t2_count} — {user} not eligible for T3")
                      gh_delete(f"repos/{repo}/issues/comments/{comment_id}")

                      # Build a helpful message showing what they need
                      paths = []
                      if t2_count < 3:
                          paths.append(f"**{3 - t2_count} more T2** bounties (you have {t2_count})")
                      if t1_count < 5 or t2_count < 1:
                          need_t1 = max(0, 5 - t1_count)
                          need_t2 = max(0, 1 - t2_count)
                          parts = []
                          if need_t1 > 0:
                              parts.append(f"{need_t1} more T1")
                          if need_t2 > 0:
                              parts.append(f"{need_t2} more T2")
                          paths.append(f"**{' + '.join(parts)}** (you have {t1_count} T1 + {t2_count} T2)")

                      body = (
                          f"⚠️ @{user} — **Tier 3 bounties are reputation-gated.**\n\n"
                          f"**Your stats:** {t1_count} T1 + {t2_count} T2 merged bounties\n\n"
                          f"**Unlock T3 via either path:**\n"
                          f"- **Path A:** 3+ merged T2 bounties\n"
                          f"- **Path B:** 5+ merged T1 + 1+ merged T2\n\n"
                          f"### Tier 3 rules:\n"
                          f"- Comment with a brief plan/proposal to claim\n"
                          f"- The project owner reviews and approves/denies your claim\n"
                          f"- Once approved: 14-day deadline, AI review ≥8/10\n\n"
                          f"Keep building — you're getting close!\n\n"
                          f"⚠️ Star rewards and content bounties don't count toward tier progression.\n\n"
                          f"*— SolFoundry Bot 🏭*"
                      )
                      gh_post(f"repos/{repo}/issues/{issue}/comments", {"body": body})
                      exit(0)

                  # Bulk claiming check: max 2 concurrent T3 claims per user
                  comments_data, _ = gh_get(f"repos/{repo}/issues/comments?per_page=100")
                  if comments_data:
                      user_t3_claims = set()
                      for c in comments_data:
                          if c["user"]["login"] == user:
                              c_lower = c.get("body", "").lower()
                              if re.search(claim_re, c_lower):
                                  c_issue_num = c["issue_url"].rstrip("/").split("/")[-1]
                                  if c_issue_num != issue:
                                      # Check if that issue is T3
                                      c_tier = get_issue_tier(c_issue_num)
                                      if c_tier == "tier-3":
                                          user_t3_claims.add(c_issue_num)

                      if len(user_t3_claims) >= 2:
                          print(f"BULK CLAIMER: {user} has {len(user_t3_claims)} active T3 claims")
                          gh_delete(f"repos/{repo}/issues/comments/{comment_id}")

                          body = (
                              f"⚠️ @{user} — You already have **{len(user_t3_claims)}** active T3 claims. "
                              f"Please complete or release existing claims before taking on more.\n\n"
                              f"Max **2 concurrent claims** for Tier 3 bounties.\n\n"
                              f"*— SolFoundry Bot 🏭*"
                          )
                          gh_post(f"repos/{repo}/issues/{issue}/comments", {"body": body})
                          exit(0)

                  # ── Eligible + under claim limit → send to Telegram for approval ──
                  print(f"T3 ELIGIBLE: {user} on #{issue} (T1={t1_count}, T2={t2_count}) — sending to Telegram for approval")

                  # Post a "pending approval" message on GitHub
                  body = (
                      f"⏳ @{user} — Your **Tier 3 claim** is pending owner approval.\n\n"
                      f"**Your stats:** {t1_count} T1 + {t2_count} T2 completed bounties ✅\n"
                      f"**Proposal:** {comment[:300]}{'...' if len(comment) > 300 else ''}\n\n"
                      f"You'll be notified here when your claim is approved or denied.\n\n"
                      f"*— SolFoundry Bot 🏭*"
                  )
                  gh_post(f"repos/{repo}/issues/{issue}/comments", {"body": body})

                  # Send Telegram notification with Approve/Deny buttons
                  tg_token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
                  tg_chat = os.environ.get("TELEGRAM_CHAT_ID", "")
                  if tg_token and tg_chat:
                      issue_url = f"https://github.com/{repo}/issues/{issue}"
                      tg_msg = (
                          f"🔴 <b>T3 Claim Request</b>\n\n"
                          f"<b>Bounty:</b> #{issue} — {os.environ.get('ISSUE_TITLE', 'Unknown')}\n"
                          f"<b>Claimant:</b> @{user}\n"
                          f"<b>Stats:</b> {t1_count} T1 + {t2_count} T2 merged\n"
                          f"<b>Proposal:</b> {comment[:200]}{'...' if len(comment) > 200 else ''}\n\n"
                          f"Approve or deny this T3 claim?"
                      )
                      keyboard = json.dumps({
                          "inline_keyboard": [[
                              {"text": "✅ Approve Claim", "callback_data": f"t3claim_approve_{issue}_{user}"},
                              {"text": "❌ Deny Claim", "callback_data": f"t3claim_deny_{issue}_{user}"}
                          ], [
                              {"text": "👀 View Issue", "url": issue_url}
                          ]]
                      })
                      payload = {
                          "chat_id": tg_chat,
                          "text": tg_msg,
                          "parse_mode": "HTML",
                          "disable_web_page_preview": True,
                          "reply_markup": keyboard
                      }
                      data = json.dumps(payload).encode()
                      tg_req = urllib.request.Request(
                          f"https://api.telegram.org/bot{tg_token}/sendMessage",
                          data=data, method="POST"
                      )
                      tg_req.add_header("Content-Type", "application/json")
                      try:
                          urllib.request.urlopen(tg_req)
                          print(f"Telegram approval request sent for T3 claim by {user} on #{issue}")
                      except Exception as e:
                          print(f"Telegram notification failed: {e}")

              except Exception as e:
                  print(f"T3 claim check failed: {e}")

          PYEOF
